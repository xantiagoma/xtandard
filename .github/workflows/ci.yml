name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: bun install
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run format --check
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: bun run build
